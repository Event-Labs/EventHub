<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/src/assets/eventhub-mark.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EventHub - Event Operations And Management Platform</title>
    <script>
      const getStoredUser = () => {
        const rawUser = localStorage.getItem('eventhub-user') || sessionStorage.getItem('eventhub-user');
        if (!rawUser) return null;
        try {
          return JSON.parse(rawUser);
        } catch {
          return null;
        }
      };

      const user = getStoredUser();
      const accountKey = user?.id || user?.user_id || user?._id || user?.email;
      const theme = accountKey ? localStorage.getItem(`eventhub-theme:${String(accountKey).toLowerCase()}`) : 'dark';
      document.documentElement.classList.toggle('light', theme === 'light');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
